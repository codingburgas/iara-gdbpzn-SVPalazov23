<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - ИАРА</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(rgba(15,23,42,0.45), rgba(15,23,42,0.65)), url('https://images.unsplash.com/photo-1516690561799-46d8f74f9abf?auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover; font-family: 'Plus Jakarta Sans', sans-serif; margin:0; }
        .card { background: white; padding: 40px; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.25); }
        h3 { font-size: 22px; margin-bottom: 6px; color: #0f172a; text-align: center; font-weight: 700; }
        .sub { font-size: 14px; color: #64748b; text-align: center; margin-bottom: 28px; }
        label { font-size: 13px; font-weight: 600; color: #334155; display: block; margin-bottom: 6px; }
        input { width: 100%; padding: 12px 14px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; font-size: 14px; margin-bottom: 16px; }
        button { width: 100%; background: #16a34a; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; }
        button:hover { background: #15803d; }
        .alert { background: #fef2f2; color: #b91c1c; padding: 10px; border-radius: 8px; font-size: 13px; text-align: center; margin-bottom: 16px; border: 1px solid #fca5a5; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Нов акаунт</h3>
        <div class="sub">Създаване на потребителски профил</div>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <div class="alert">{{ msg }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form action="/register" method="POST">
            <label>Потребителско име</label>
            <input type="text" name="username" required placeholder="Изберете име">
            <label>Парола</label>
            <input type="password" name="password" required placeholder="••••••••">
            <label>Повтори парола</label>
            <input type="password" name="confirm_password" required placeholder="••••••••">
            <button type="submit">Регистрирай ме</button>
            <div style="text-align: center; margin-top: 18px;"><a href="/login" style="color: #0284c7; text-decoration: none; font-size: 13px; font-weight: 600;">Вече имам акаунт</a></div>
        </form>
    </div>
</body>
</html>
